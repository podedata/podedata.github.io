      <feColorMatrix in="b" type="matrix" values="1 0 0 0 0.15  0 1 0 0 0.35  0 0 1 0 0.85  0 0 0 0.85 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

